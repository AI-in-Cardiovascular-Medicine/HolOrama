repos:
  - repo: https://github.com/psf/black
    rev: 22.12.0
    hooks:
      - id: black
        args: [--target-version, py311]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: mypy
        name: Mypy type checking
        entry: uv run mypy src/ --ignore-missing-imports --check-untyped-defs
        language: system
        types: [python]
        pass_filenames: false
