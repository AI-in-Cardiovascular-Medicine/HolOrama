defaults:  
  - _self_  
  - override hydra/hydra_logging: disabled  
  - override hydra/job_logging: disabled  
  
hydra:  
  output_subdir: null  
  run:  
    dir: .

display:
  image_size: 800
  gating_display_stretch: 1
  lview_display_stretch: 1
  windowing_sensitivity: 0.03  # 1 for default, below 1 for slower, above 1 for faster
  zoom_sensitivity: 0.005  # fraction of zoom per pixel dragged; below 0.005 for slower, above for faster
  n_interactive_points: 20 # for lumen, calcium, lipid, macrophage, branch default to half of this
  n_points_contour: 200  # ideally choose a multiple of 100 (for calculation of closest points)
  contour_thickness: 2
  point_thickness: 1
  point_radius: 10
  color_contour: 'green' # 20 predefined colors in PyQt5 (https://doc.qt.io/qt-6/qcolor.html)
  color_eem: '#03b1fc'
  color_calcium: 'white'
  color_branch: '#006400'
  color_start_point: 'yellow'
  color_end_point: 'red'
  color_angle: '#ffa500'
  alpha_contour: 100 # 0-255

gating:
  normalize_step: 100
  # butterworth filter for gating
  lowcut: 1.33  # lowcut frequency for Butterworth filter [Hz]
  highcut: 6.0  # highcut frequency for Butterworth filter [Hz]
  order: 6  # order of Butterworth filter
  # identify extrema
  extrema_y_lim: 50  # percentile of how much higher next peak has to be (y-component)
  extrema_x_lim: 6  # minimum distance between peaks (x-component)
  maxima_only: False

report:
  plot: False
  save_as_csv: True

save:
  autosave_interval: 10000  # in ms
  nifti_dir: './models/app_niftis'
  save_niftis: 'none'  # 'contoured', 'all', 'none' (which frames to save as NIfTi)
  save_2d: False
  save_3d: True

segmentation:
  # model_file: './models/old/u2net_2d_MINMAX_512_best.h5'
  model_file: './models/nnUNetTrainerU2NetP__nnUNetResEncUNetLPlans__2d'
  model_fold: 0
  normalize: False # When working with tensorflow models set this to True
  input_dir: /home/sebalzer/Documents/Projects/AAOCASeg/IVUSimages  # only needed for segment_files.py
  batch_size: 16
  conserve_memory: True  # set to True for devices with less than 32 GB RAM (increases inference times)
