name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pre-commit and tools
        # mypy hook uses language:system so mypy must be present in the venv
        run: pip install pre-commit mypy

      - name: Run pre-commit hooks (same checks as local)
        run: pre-commit run --all-files

  test:
    name: Test Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux - needed for PyQt6)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-xinerama0 libxkbcommon-x11-0 libdbus-1-3 \
            libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy==1.26.4" pandas scipy scikit-image matplotlib seaborn shapely nibabel
          pip install loguru tqdm omegaconf "hydra-core>=1.3"
          pip install "pydicom==2.4.4" pylibjpeg pylibjpeg-libjpeg SimpleITK
          pip install opencv-python-headless
          pip install "PyQt6==6.10.2" pyqtdarktheme
          pip install pytest pytest-qt pytest-mock pytest-cov

      - name: Run tests (Linux - headless Qt via offscreen platform)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pytest
